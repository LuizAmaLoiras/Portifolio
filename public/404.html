<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Pagina nao encontrada | Luiz Felipe</title>
    <style>
      :root {
        color: #e5f7ff;
        background: #050816;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.2), transparent 28%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.18), transparent 28%),
          #050816;
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.76);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      span {
        color: #22d3ee;
        font-weight: 950;
        text-transform: uppercase;
      }

      h1 {
        margin: 12px 0;
        font-size: clamp(2rem, 8vw, 3.6rem);
        line-height: 1;
      }

      p {
        color: #93a4b8;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        margin-top: 12px;
        padding: 0 20px;
        border-radius: 8px;
        background: linear-gradient(135deg, #22d3ee, #a78bfa);
        color: #03121d;
        font-weight: 950;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span>404</span>
      <h1>Pagina nao encontrada</h1>
      <p>Esse caminho nao existe no portifolio. Volte para a pagina inicial para continuar navegando.</p>
      <a href="/">Voltar para o inicio</a>
    </main>
  </body>
</html>
